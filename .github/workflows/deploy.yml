# .github/workflows/deploy.yml
# ──────────────────────────────────────────────────────────────────────────
# Pulsar — GitHub Pages deployment
#
# Trigger: push to main (or manual dispatch).
# Steps:
#   1. Sync pipeline data from the server (SSH + sync-data.py).
#   2. Install Node deps with pnpm.
#   3. Build the Astro static site.
#   4. Deploy to GitHub Pages.
#
# Required secrets (Settings → Secrets → Actions):
#   DEPLOY_SSH_KEY     — private key for SSH access to the server
#   DEPLOY_SSH_HOST    — hostname of the server (e.g. exe.dev or IP)
#   DEPLOY_SSH_USER    — SSH username (e.g. admin)
#
# Optional: if data is already committed to the repo, skip steps 3a–3c.
# ──────────────────────────────────────────────────────────────────────────

name: Deploy Pulsar to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:   # manual trigger from the Actions tab

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages:    write
  id-token: write

# Cancel in-progress runs on the same branch (avoid double-deploys)
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Node setup ────────────────────────────────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── pnpm setup ────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # ── Optional: sync data via SSH ───────────────────────────────────────
      # Skipped when DEPLOY_SSH_KEY secret is not set (e.g. data is committed).
      - name: Sync pipeline data via SSH
        if: ${{ secrets.DEPLOY_SSH_KEY != '' }}
        env:
          SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        run: |
          # Write private key
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          # Add host to known_hosts (suppress first-time prompt)
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # Run sync-data.py on the server and pull results back
          # The server script copies files to a temp dir, then we rsync them here.
          ssh -i ~/.ssh/deploy_key "$SSH_USER@$SSH_HOST" \
            "sudo python3.11 /home/claudeuser/pulsar-web/scripts/sync-data.py \
              --verbose 2>&1"

          # Rsync the generated src/data/ back to the runner
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            "$SSH_USER@$SSH_HOST:/home/claudeuser/pulsar-web/src/data/" \
            "./src/data/"

          echo "Data sync complete"

      # ── Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Type-check (optional but recommended) ────────────────────────────
      - name: Type-check
        run: pnpm exec astro check
        continue-on-error: true   # don't block deploy on type errors

      # ── Build ─────────────────────────────────────────────────────────────
      - name: Build Astro site
        run: pnpm build

      # ── Upload artifact ───────────────────────────────────────────────────
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      # ── Deploy to GitHub Pages ────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
