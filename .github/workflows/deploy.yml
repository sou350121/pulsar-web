name: Deploy Pulsar to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 每天 11:55 上海時間（03:55 UTC）開始重建，12:00 前就緒；pipeline 在 11:15 結束
    - cron: '55 3 * * *'

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Sync pipeline data via SSH
        env:
          SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        if: ${{ env.SSH_KEY != '' }}
        continue-on-error: true   # fallback: use committed src/data/ if SSH fails
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          SSH_OPTS="-i ~/.ssh/deploy_key -p 22222 -o StrictHostKeyChecking=no -o ConnectTimeout=30 -o ServerAliveInterval=15 -o ServerAliveCountMax=10"
          # Retry SSH up to 3 times (sshd MaxStartups may drop connections under brute-force load)
          for attempt in 1 2 3; do
            echo "SSH attempt $attempt/3..."
            if ssh $SSH_OPTS "$SSH_USER@$SSH_HOST" \
                "cd /home/admin/clawd/pulsar-web && sudo -u admin git pull --rebase origin main 2>&1 | tail -3 && \
                 sudo timeout 90 python3.11 /home/admin/clawd/scripts/fetch-ai-github.py 2>&1 | tail -3 && \
                 sudo timeout 30 python3.11 /home/admin/clawd/scripts/build-graph-data.py 2>&1 | tail -5 && \
                 sudo timeout 30 python3.11 /home/admin/clawd/pulsar-web/scripts/build-atlas-data.py 2>&1 | tail -5 && \
                 sudo python3.11 /home/admin/clawd/pulsar-web/scripts/sync-data.py --verbose 2>&1 && \
                 cd /home/admin/clawd/pulsar-web && tar czf /tmp/pulsar-data.tar.gz src/data/"; then
              echo "SSH sync succeeded on attempt $attempt"
              break
            fi
            [ $attempt -lt 3 ] && { echo "Retrying in 15s..."; sleep 15; }
          done
          # Pull the tarball (also with retry)
          for attempt in 1 2 3; do
            if scp $SSH_OPTS "$SSH_USER@$SSH_HOST:/tmp/pulsar-data.tar.gz" /tmp/pulsar-data.tar.gz; then
              tar xzf /tmp/pulsar-data.tar.gz
              echo "Data sync complete."
              break
            fi
            [ $attempt -lt 3 ] && { echo "SCP retry $attempt in 15s..."; sleep 15; }
          done

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec astro check
        continue-on-error: true

      - name: Build Astro site
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
