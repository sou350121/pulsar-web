name: Deploy Pulsar to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    # 每天 12:00 上海時間（04:00 UTC）自動重建，pipeline 在 11:15 結束
    - cron: '0 4 * * *'

permissions:
  contents: read
  pages:    write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Sync pipeline data via SSH
        env:
          SSH_KEY:  ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
        if: ${{ env.SSH_KEY != '' }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          # Run sync + tar in one SSH session to avoid reconnect issues
          ssh -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            -o ConnectTimeout=30 \
            "$SSH_USER@$SSH_HOST" \
            "sudo python3.11 /home/claudeuser/pulsar-web/scripts/sync-data.py --verbose 2>&1 && \
             cd /home/claudeuser/pulsar-web && tar czf /tmp/pulsar-data.tar.gz src/data/"
          # Pull the tarball in a second connection
          sleep 2
          scp -i ~/.ssh/deploy_key \
            -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST:/tmp/pulsar-data.tar.gz" \
            /tmp/pulsar-data.tar.gz
          tar xzf /tmp/pulsar-data.tar.gz

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check
        run: pnpm exec astro check
        continue-on-error: true

      - name: Build Astro site
        run: pnpm build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
